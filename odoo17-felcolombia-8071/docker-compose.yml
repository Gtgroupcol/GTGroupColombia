version: '3'
services:
  db:
    image: postgres:15.7
    environment:
      - POSTGRES_PASSWORD=odoo
      - POSTGRES_USER=odoo
      - POSTGRES_DB=postgres
      - PGDATA=/var/lib/postgresql/data/pgdata
      - TZ=America/Bogota  # Set timezone
    volumes:
      - odoo-db-data:/var/lib/postgresql/data/pgdata
    restart: always  # run as a service

  odoo16:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: odoo17col
    depends_on:
      - db
    ports:
      - "8071:8069"
      - "20017:8072"
    tty: true
    volumes:
      - odoo-web-data:/var/lib/odoo
      - ./addons-custom:/mnt/extra-addons
      - ./etc:/etc/odoo
    environment:
      - TZ=America/Bogota  # Set timezone
      - HOST=db
      - USER=odoo
      - PASSWORD=odoo
      - DB_NAME=postgres
    restart: always  # run as a service

  pgadmin4:
    image: dpage/pgadmin4
    environment:
      - PGADMIN_DEFAULT_EMAIL=yycastrillon@gmail.com
      - PGADMIN_DEFAULT_PASSWORD=Castrillon123@
      - TZ=America/Bogota  # Set timezone
    ports:
      - "5051:80"
    depends_on:
      - db
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    restart: always

volumes:
  odoo-db-data:
  odoo-web-data:
  pgadmin-data: